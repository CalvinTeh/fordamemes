<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q2 Performance Dashboard - Confidential</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      transition: background 1.5s ease;
      overflow: hidden;
      height: 100vh;
    }

    /* === CORPORATE BAIT SCREEN === */
    #corporate-bait {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #c48f2a, #f5be50);
      z-index: 3000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white;
    }
    #corporate-bait .logo-area {
      font-size: 0.9em; opacity: 0.7; letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 40px;
    }
    #corporate-bait h1 {
      font-size: 2.2em; font-weight: 300; margin-bottom: 10px;
    }
    #corporate-bait .subtitle {
      font-size: 1em; opacity: 0.8; margin-bottom: 50px;
    }
    #corporate-bait .loading-bar {
      width: 300px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
      overflow: hidden; margin-bottom: 15px;
    }
    #corporate-bait .loading-fill {
      height: 100%; width: 0%; background: #fff; border-radius: 2px;
      animation: loadProgress 4s ease-in-out forwards;
    }
    @keyframes loadProgress {
      0% { width: 0%; }
      60% { width: 72%; }
      85% { width: 88%; }
      100% { width: 100%; }
    }
    #corporate-bait .loading-text {
      font-size: 0.85em; opacity: 0.6;
    }
    #corporate-bait .click-prompt {
      margin-top: 40px; padding: 14px 40px;
      background: #fff; color: #b8860b; border: none; border-radius: 6px;
      font-size: 1em; font-weight: 600; cursor: pointer;
      opacity: 0; animation: fadeInBtn 1s ease 3.8s forwards;
      transition: transform 0.2s;
    }
    #corporate-bait .click-prompt:hover { transform: scale(1.05); }
    @keyframes fadeInBtn { to { opacity: 1; } }

    /* === PRANK SCREEN === */
    #prank-content {
      display: none;
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      justify-content: center; align-items: center; flex-direction: column;
      z-index: 2000;
    }
    #prank-content.active {
      display: flex;
    }

    #meme-gif {
      max-width: min(500px, 85vw); border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: transform 0.6s ease;
      z-index: 10;
    }

    #prank-text {
      font-size: 2.5em; font-weight: 800; color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      margin-top: 20px; text-align: center;
      opacity: 0; transform: scale(0.5);
      transition: all 0.5s ease;
      z-index: 10;
    }
    #prank-text.show {
      opacity: 1; transform: scale(1);
    }

    #fine-print {
      position: fixed; bottom: 20px; width: 100%; text-align: center;
      font-size: 0.8em; color: rgba(255,255,255,0.6);
      opacity: 0; transition: opacity 1s ease;
      z-index: 10;
    }
    #fine-print.show { opacity: 1; }

    /* Floating corporate buzzwords */
    .buzzword {
      position: fixed; font-size: 1.2em; font-weight: 600;
      color: rgba(255,255,255,0.15); pointer-events: none;
      animation: floatUp 8s linear forwards;
      z-index: 1;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
    }

    /* Gentle pulsing background */
    @keyframes gentlePulse {
      0%   { background: #1a1a2e; }
      25%  { background: #16213e; }
      50%  { background: #0f3460; }
      75%  { background: #1a1a2e; }
      100% { background: #1a1a2e; }
    }

  </style>
</head>
<body>

<!-- Phase 1: Corporate bait that requires a click (unlocks audio) -->
<div id="corporate-bait">
  <div class="logo-area">&#9679; Cochlear Internal Portal</div>
  <h1>Your Performance Review</h1>
  <div class="subtitle">Preparing your personalised dashboard...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-status">Connecting to CMY systems...</div>
  <button class="click-prompt" id="reveal-btn">View My Results</button>
</div>

<!-- Phase 2: The prank -->
<div id="prank-content">
  <img id="meme-gif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="Surprise">
  <div id="prank-text"></div>
  <div id="fine-print">This message was approved by ME™</div>
</div>

<!-- No external audio needed - generated via Web Audio API -->

<script>
(function() {
  // Elements
  const bait = document.getElementById('corporate-bait');
  const prankContent = document.getElementById('prank-content');
  const revealBtn = document.getElementById('reveal-btn');
  const prankText = document.getElementById('prank-text');
  const finePrint = document.getElementById('fine-print');
  const loadingStatus = document.getElementById('loading-status');
  const memeGif = document.getElementById('meme-gif');

  // === WEB AUDIO API: "Kung Fu Fighting" melody ===
  let audioCtx = null;

  function playKungFuRiff() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    let t = audioCtx.currentTime + 0.05;
    const bpm = 116; // original tempo
    const beat = 60 / bpm;

    // --- Helper: synth note ---
    function playNote(freq, start, duration, type, vol) {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      env.gain.setValueAtTime(vol || 0.25, start);
      env.gain.setValueAtTime(vol || 0.25, start + duration * 0.7);
      env.gain.exponentialRampToValueAtTime(0.001, start + duration);
      osc.connect(env);
      env.connect(masterGain);
      osc.start(start);
      osc.stop(start + duration + 0.01);
    }

    // --- Helper: funky bass note ---
    function playBass(freq, start, duration) {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      env.gain.setValueAtTime(0.18, start);
      env.gain.exponentialRampToValueAtTime(0.001, start + duration);
      osc.connect(env);
      env.connect(masterGain);
      osc.start(start);
      osc.stop(start + duration + 0.01);
    }

    // --- Helper: hi-hat / snare ---
    function playDrum(start, isSnare) {
      const len = isSnare ? 0.12 : 0.05;
      const bufferSize = Math.floor(audioCtx.sampleRate * len);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const src = audioCtx.createBufferSource();
      const env = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = isSnare ? 'bandpass' : 'highpass';
      filter.frequency.value = isSnare ? 3000 : 8000;
      src.buffer = buffer;
      env.gain.setValueAtTime(isSnare ? 0.4 : 0.15, start);
      env.gain.exponentialRampToValueAtTime(0.001, start + len);
      src.connect(filter);
      filter.connect(env);
      env.connect(masterGain);
      src.start(start);
    }

    // Note frequencies (key of C minor)
    const C4 = 261.63, D4 = 293.66, Eb4 = 311.13, F4 = 349.23, G4 = 392.00;
    const Ab4 = 415.30, Bb4 = 466.16, C5 = 523.25, D5 = 587.33, Eb5 = 622.25;
    const C3 = 130.81, Eb3 = 155.56, F3 = 174.61, G3 = 196.00, Ab3 = 207.65, Bb3 = 233.08;

    // ===== ICONIC INTRO RIFF (funky synth) =====
    // The "duh duh duh duh-duh" opening
    const introRiff = [
      { n: C5,  t: 0,            d: beat * 0.3 },
      { n: C5,  t: beat * 0.5,   d: beat * 0.3 },
      { n: Bb4, t: beat * 1.0,   d: beat * 0.3 },
      { n: C5,  t: beat * 1.5,   d: beat * 0.5 },
      { n: G4,  t: beat * 2.5,   d: beat * 0.3 },
      { n: G4,  t: beat * 3.0,   d: beat * 0.3 },
      { n: F4,  t: beat * 3.5,   d: beat * 0.3 },
      { n: G4,  t: beat * 4.0,   d: beat * 0.8 },
    ];

    // Play intro riff twice
    introRiff.forEach(note => {
      playNote(note.n, t + note.t, note.d, 'square', 0.22);
      playNote(note.n, t + note.t, note.d, 'sawtooth', 0.08);
    });
    const riff2Start = beat * 5;
    introRiff.forEach(note => {
      playNote(note.n, t + riff2Start + note.t, note.d, 'square', 0.22);
      playNote(note.n, t + riff2Start + note.t, note.d, 'sawtooth', 0.08);
    });

    // ===== VOCAL MELODY: "Everybody was kung fu fighting" =====
    const vocStart = beat * 10;
    const vocal1 = [
      // "Eve - ry - bo - dy   was   kung  fu   fight - ing"
      { n: G4,  t: 0,            d: beat * 0.4 },  // Eve-
      { n: G4,  t: beat * 0.5,   d: beat * 0.4 },  // -ry-
      { n: G4,  t: beat * 1.0,   d: beat * 0.4 },  // -bo-
      { n: G4,  t: beat * 1.5,   d: beat * 0.5 },  // -dy
      { n: G4,  t: beat * 2.5,   d: beat * 0.4 },  // was
      { n: Eb4, t: beat * 3.2,   d: beat * 0.3 },  // kung
      { n: G4,  t: beat * 3.7,   d: beat * 0.3 },  // fu
      { n: Ab4, t: beat * 4.2,   d: beat * 0.5 },  // fight-
      { n: G4,  t: beat * 4.8,   d: beat * 1.0 },  // -ing
    ];

    // "Those kicks were fast as lightning"
    const vocal2Start = beat * 6;
    const vocal2 = [
      // "Those  kicks  were  fast   as    light  -  ning"
      { n: Bb4, t: 0,            d: beat * 0.4 },  // Those
      { n: Bb4, t: beat * 0.5,   d: beat * 0.4 },  // kicks
      { n: Bb4, t: beat * 1.0,   d: beat * 0.4 },  // were
      { n: Ab4, t: beat * 1.5,   d: beat * 0.4 },  // fast
      { n: G4,  t: beat * 2.0,   d: beat * 0.4 },  // as
      { n: F4,  t: beat * 2.8,   d: beat * 0.5 },  // light-
      { n: Eb4, t: beat * 3.5,   d: beat * 1.2 },  // -ning
    ];

    vocal1.forEach(note => {
      playNote(note.n, t + vocStart + note.t, note.d, 'square', 0.2);
      playNote(note.n * 2, t + vocStart + note.t, note.d * 0.5, 'sine', 0.06);
    });
    vocal2.forEach(note => {
      playNote(note.n, t + vocStart + vocal2Start + note.t, note.d, 'square', 0.2);
      playNote(note.n * 2, t + vocStart + vocal2Start + note.t, note.d * 0.5, 'sine', 0.06);
    });

    // ===== BASS LINE (funky octave C minor) =====
    const bassPattern = [0, 0.5, 1.5, 2, 3, 3.5];
    const bassNotes = [C3, C3, Eb3, F3, G3, G3];
    for (let bar = 0; bar < 5; bar++) {
      const barStart = bar * beat * 4;
      bassPattern.forEach((pos, i) => {
        playBass(bassNotes[i % bassNotes.length], t + barStart + beat * pos, beat * 0.4);
      });
    }

    // ===== DRUM PATTERN =====
    for (let bar = 0; bar < 5; bar++) {
      const barStart = bar * beat * 4;
      for (let eighth = 0; eighth < 8; eighth++) {
        const hitTime = t + barStart + eighth * beat * 0.5;
        playDrum(hitTime, false); // hi-hat on every eighth
        if (eighth === 2 || eighth === 6) playDrum(hitTime, true); // snare on 2 & 4
      }
    }

    // ===== REPEAT THE HOOK once more =====
    const rep = beat * 20;
    introRiff.forEach(note => {
      playNote(note.n, t + rep + note.t, note.d, 'square', 0.22);
      playNote(note.n, t + rep + note.t, note.d, 'sawtooth', 0.08);
    });

    // Fade out after ~12 seconds
    const totalDur = beat * 24;
    masterGain.gain.setValueAtTime(0.4, t + totalDur - 2);
    masterGain.gain.linearRampToValueAtTime(0, t + totalDur);

    setTimeout(() => {
      if (audioCtx) audioCtx.close();
    }, (totalDur + 1) * 1000);
  }

  // Fake loading messages for corporate authenticity
  const loadingMsgs = [
    "Connecting to Internal systems...",
    "Retrieving Test data...",
    "Calculating compliance index...",
    "Cross-referencing with Design feedback...",
    "Almost ready..."
  ];
  let msgIdx = 0;
  const loadingInterval = setInterval(() => {
    msgIdx++;
    if (msgIdx < loadingMsgs.length) {
      loadingStatus.textContent = loadingMsgs[msgIdx];
    }
  }, 900);

  // Corporate buzzwords that float up during prank
  const buzzwords = [
    "Kung-Fu", "Inventory Check", "Purchase Request", "TAIIII CHIIIII",
    "Hwaaayaaa", "Chiu Chiu", "Saoooooo", "Shining Palm", "Dragon Strike",
    "Flying Crane", "Iron Fist", "Shadow Kick", "Tiger Claw", "Phoenix Rise",
    "Zen Focus", "Balance of Power", "Inner Strength", "Flow State", "Mind Over Matter"
  ];

  function spawnBuzzword() {
    const word = document.createElement('div');
    word.className = 'buzzword';
    word.textContent = buzzwords[Math.floor(Math.random() * buzzwords.length)];
    word.style.left = (Math.random() * 80 + 10) + '%';
    word.style.fontSize = (0.9 + Math.random() * 1.2) + 'em';
    document.body.appendChild(word);
    setTimeout(() => word.remove(), 8000);
  }

  // Prank messages that cycle
  const prankMessages = [
    "Your performance rating: OUTSTANDING* 🥋",
    "* at Tai Chi",
    "Congratulations... you've been pranked.",
    "Please have a good laugh 📋",
    "Let's circle back to actual work 🔄",
    "Don't be stressed 📈",
    "Happy April Fools! 🎉"
  ];

  // ===== MAIN REVEAL =====
  revealBtn.addEventListener('click', function() {
    clearInterval(loadingInterval);

    // Fade out bait
    bait.style.transition = 'opacity 0.5s ease';
    bait.style.opacity = '0';

    setTimeout(() => {
      bait.style.display = 'none';

      // Show prank
      prankContent.classList.add('active');
      document.body.style.animation = 'gentlePulse 6s ease infinite';

      // Play kung fu riff (user clicked, so we have interaction permission)
      playKungFuRiff();

      // Start cycling prank text
      let textIdx = 0;
      function showNextMessage() {
        prankText.classList.remove('show');
        setTimeout(() => {
          prankText.textContent = prankMessages[textIdx % prankMessages.length];
          prankText.classList.add('show');
          textIdx++;
        }, 300);
      }
      showNextMessage();
      setInterval(showNextMessage, 3000);

      // Gentle meme wiggle (not seizure-inducing bouncing)
      let wiggle = 0;
      setInterval(() => {
        wiggle++;
        const angle = Math.sin(wiggle * 0.3) * 5;
        const scale = 1 + Math.sin(wiggle * 0.2) * 0.05;
        memeGif.style.transform = `rotate(${angle}deg) scale(${scale})`;
      }, 100);

      // Spawn floating buzzwords periodically
      spawnBuzzword();
      setInterval(spawnBuzzword, 1500);

      // Show fine print after a moment
      setTimeout(() => finePrint.classList.add('show'), 4000);

    }, 500);
  });
})();
</script>

</body>
</html>
