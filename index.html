<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kung Fu Surprise</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: black;
    }
    img {
      max-width: 90%;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="Tai Chi Meme">

  <audio id="kungfu-audio" autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/07/26/audio_124bfae5e2.mp3" type="audio/mpeg">
    <!-- This is a royalty-free version of 'Kung Fu Fighting'. For the original, you must have the rights to use it. -->
    Your browser does not support the audio element.
  </audio>
  <button id="play-btn" style="position:fixed;top:20px;right:20px;font-size:1.2em;padding:10px 20px;z-index:1000;">Play Song</button>
<script>
// ...existing code...

// Ensure audio plays on user interaction
const audio = document.getElementById('kungfu-audio');
const playBtn = document.getElementById('play-btn');

function tryPlayAudio() {
  audio.play().then(() => {
    playBtn.style.display = 'none';
  }).catch(() => {
    playBtn.style.display = 'block';
  });
}

// Try to play on load
window.addEventListener('load', tryPlayAudio);

// Play on button click
playBtn.addEventListener('click', tryPlayAudio);

// Optionally, hide button if audio starts playing
audio.addEventListener('play', () => {
  playBtn.style.display = 'none';
});
</script>

<script>
// Flashing background colors
const colors = ["#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff", "#ffffff", "#000000"]; // Add more for fun
let colorIndex = 0;
setInterval(() => {
  document.body.style.background = colors[colorIndex % colors.length];
  colorIndex++;
}, 200);

// Randomly move the image
const img = document.querySelector('img');
function moveImage() {
  const maxX = window.innerWidth - img.offsetWidth;
  const maxY = window.innerHeight - img.offsetHeight;
  const x = Math.random() * maxX;
  const y = Math.random() * maxY;
  img.style.position = 'absolute';
  img.style.left = x + 'px';
  img.style.top = y + 'px';
}
setInterval(moveImage, 700);

// Pop-up prank message after a few seconds
setTimeout(() => {
  alert("You've been Kung Fu pranked! 🥋");
}, 5000);
</script>

</body>
</html>
